<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Core — BrandNest Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@800;900&display=swap');

        :root {
            --bg: #000c0d;
            --accent: #a855f7;
            --secondary: #06b6d4;
            --text: #ffffff;
            --text-dim: #999999;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.02);
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1, h2, h3, .logo { font-family: 'Unbounded', sans-serif; text-transform: uppercase; line-height: 0.95; letter-spacing: -0.02em; font-weight: 800; }

        /* SPACE ENGINE */
        .space-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        canvas#stars { position: absolute; inset: 0; opacity: 0.6; }
        .orb {
            position: absolute; border-radius: 50%; z-index: -2;
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset -25px -25px 80px rgba(0,0,0,0.9), inset 25px 25px 80px rgba(255,255,255,0.15);
            filter: blur(40px);
        }
        .orb-p { width: 600px; height: 600px; top: -10%; right: -10%; background: radial-gradient(circle at 35% 35%, #9333ea 0%, #6b21a8 40%, #2e1065 70%, #000 100%); }
        .orb-b { width: 400px; height: 400px; bottom: -10%; left: -10%; background: radial-gradient(circle at 35% 35%, #0891b2 0%, #06b6d4 40%, #164e63 70%, #000 100%); }

        .noise-bg {
            position: fixed; inset: 0; z-index: -1; opacity: 0.05; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* BACK BUTTON */
        .back-nav {
            position: fixed; top: 3rem; left: 3rem; z-index: 100;
        }
        .back-btn {
            text-decoration: none; color: #fff; font-size: 0.8rem; font-weight: 800;
            letter-spacing: 0.2em; text-transform: uppercase;
            display: flex; align-items: center; gap: 1rem;
            transition: 0.4s var(--curve);
            opacity: 0.5;
        }
        .back-btn:hover { opacity: 1; transform: translateX(-10px); color: var(--accent); }

        /* FORM */
        .contact-container {
            max-width: 800px; width: 100%; position: relative;
        }

        .form-header { margin-bottom: 4rem; text-align: center; }
        .form-header h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 1rem; }
        .gradient-text { 
            background: linear-gradient(to right, #a855f7, #ec4899, #06b6d4); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .contact-form {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
        }
        .form-group { position: relative; }
        .form-group.full { grid-column: span 2; }
        
        .form-input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 1.2rem 1.5rem; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem; transition: 0.4s var(--curve); outline: none;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        
        .form-label {
            position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%);
            font-size: 0.75rem; font-weight: 700; color: var(--text-dim);
            letter-spacing: 0.1em; text-transform: uppercase; pointer-events: none; transition: 0.4s var(--curve);
        }
        .form-input:focus + .form-label, .form-input:not(:placeholder-shown) + .form-label {
            top: -0.8rem; left: 0.5rem; color: var(--accent); font-size: 0.65rem;
        }

        .form-input option { background: #000c0d; color: #fff; }

        .submit-btn {
            grid-column: span 2; background: var(--accent); color: #fff; border: none;
            padding: 1.5rem; border-radius: 12px; font-family: 'Unbounded', sans-serif;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.4s var(--curve); margin-top: 1rem;
        }
        .submit-btn:hover { background: #fff; color: #000; transform: scale(1.02); }

        .success-message {
            display: none; flex-direction: column; align-items: center; text-align: center;
        }
        .success-message h2 { font-size: 4rem; color: var(--accent); margin-bottom: 2rem; }

        @media (max-width: 768px) {
            .contact-form { grid-template-columns: 1fr; }
            .form-group.full, .submit-btn { grid-column: span 1; }
            .back-nav { top: 2rem; left: 2rem; }
            .form-header h1 { font-size: 3rem; }
            .orb-p { width: 300px; height: 300px; top: -5%; right: -10%; }
            .orb-b { width: 200px; height: 200px; bottom: -5%; left: -10%; }
        }
    </style>
</head>
<body>

    <div class="space-container">
        <canvas id="stars"></canvas>
        <div class="orb orb-p"></div>
        <div class="orb orb-b"></div>
        <div class="noise-bg"></div>
    </div>

    <nav class="back-nav">
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> BACK
        </a>
    </nav>

    <div class="contact-container">
        <div class="form-header">
            <div style="font-size: 0.75rem; color: var(--accent); letter-spacing: 0.4em; font-weight: 800; margin-bottom: 1.5rem;">MISSION CONTROL</div>
            <h1>Secure Your <span class="gradient-text">Core.</span></h1>
            <p style="color: var(--text-dim); max-width: 600px; margin: 0 auto;">Our synchronization window is currently open. Provide your mission parameters below.</p>
        </div>

        <form class="contact-form" action="https://formsubmit.co/ffbtwadi@gmail.com" method="POST">
            <!-- Hidden configuration fields -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="NEW MISSION: BrandNest Lead">
            <input type="hidden" name="_template" value="table">
            <div class="form-group">
                <input type="text" name="Full Name" class="form-input" placeholder=" " required>
                <label class="form-label">Full Name</label>
            </div>
            <div class="form-group">
                <input type="email" name="Email" class="form-input" placeholder=" " required>
                <label class="form-label">Email Address</label>
            </div>
            <div class="form-group">
                <input type="tel" name="WhatsApp" class="form-input" placeholder=" " required>
                <label class="form-label">WhatsApp Number</label>
            </div>
            <div class="form-group">
                <select name="Service" class="form-input" required>
                    <option value="" disabled selected></option>
                    <option value="website">Website Development</option>
                    <option value="ads">Ads Management</option>
                    <option value="marketing">Digital Marketing</option>
                    <option value="render">Product Rendering</option>
                    <option value="graphics">Graphics Design</option>
                </select>
                <label class="form-label">Service Required</label>
            </div>
            <div class="form-group full">
                <select name="Budget" class="form-input" required>
                    <option value="" disabled selected></option>
                    <option value="50">$50 - $200</option>
                    <option value="200">$200 - $500</option>
                    <option value="500">$500 - $1,000</option>
                    <option value="1000">$1,000+</option>
                </select>
                <label class="form-label">Budget Index</label>
            </div>
            <div class="form-group full">
                <textarea name="Message" class="form-input" style="min-height: 150px; resize: none;" placeholder=" " required></textarea>
                <label class="form-label">Your Message</label>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">GET QUOTE // →</button>
        </form>

        <div class="success-message">
            <h2>RESPONSE HAS BEEN SUBMITTED</h2>
            <p style="color: var(--text-dim); font-size: 1.2rem; margin-bottom: 3rem;">Our team will contact you soon.</p>
            <a href="index.html" class="submit-btn" style="text-decoration:none; display:inline-block; width: auto; padding: 1.2rem 3rem;">Return Home</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Star Engine
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<250; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.5, o: Math.random(), t: Math.random() * 0.01 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.o += s.t; if(s.o > 1 || s.o < 0.2) s.t *= -1; ctx.fillStyle = `rgba(255,255,255,${s.o})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Form Submit
        const form = document.querySelector('.contact-form');
        const header = document.querySelector('.form-header');
        const success = document.querySelector('.success-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Show loading state
            submitBtn.innerText = "GENERATING QUOTE...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                gsap.to([form, header], { opacity: 0, y: -50, duration: 0.8, stagger: 0.2, onComplete: () => {
                    form.style.display = 'none';
                    header.style.display = 'none';
                    success.style.display = 'flex';
                    gsap.from(success, { opacity: 0, scale: 0.9, y: 50, duration: 1, ease: "power4.out" });
                }});
            }).catch(error => {
                alert("Transmission failed. Please check your network.");
                submitBtn.innerText = "GET QUOTE // →";
                submitBtn.disabled = false;
            });
        });

        // Entrance
        gsap.from('.contact-container', { opacity: 0, y: 100, duration: 1.5, ease: "power4.out" });

        // WhatsApp Number Filter (Numbers and symbols only)
        const waInput = document.querySelector('input[name="WhatsApp"]');
        waInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9+\-()\s]/g, '');
        });
    </script>
</body>
</html>
